================================================================================
PROTOTYPE — Governance Fluency Quiz
================================================================================
Path:      /governance-design-package/prototypes/quiz.html
Built:     2026-05-17
Author:    JII prototype-builder pass (claude)
Status:    Functional prototype, awaiting claude-design visual polish.

DATA CONTRACT
-------------
Source: ../data/quiz-bank.json (schema_version 1.0).
  bank.themes:    [{id, name_en, name_ja, slug}]
  bank.questions: [{
    id, theme(int 1..5), difficulty('intro'|'intermediate'|'advanced'),
    stem_en, stem_ja,
    options_en[4], options_ja[4], correct(int 0..3),
    explanation_en, explanation_ja,
    curriculum_slug, primary_source, tags[]
  }]
Loader tries fetch('../data/quiz-bank.json') first; falls back to inlined
EMBEDDED_BANK (mirrors the JSON at build time) when file:// blocks fetch.

INTERACTION MODEL
-----------------
State machine:  idle -> quizzing -> answered -> next -> ... -> results
                |---- (Esc / Abort) ----------------------------|
States stored on `state` object; renderXXX() functions repaint #stage.
LocalStorage key 'jii-quiz-best-v1' tracks best score-per-mode for the
"Personal best" overlay on the start screen. Mode key includes filter id
(e.g. 'theme:3', 'difficulty:advanced') so per-theme bests are separate.

DESIGN INTENT
-------------
Editorial, calm. Same palette/typography as jpinv.com (Noto Serif JP for
headlines, Noto Sans JP body, DM Mono labels). Muted gold accent #9a7838
for progress and selection. White card on bg-soft. Question stem in serif
to feel like a primary-source quotation. Submit/Next animation: card
fades-and-slides; correct/incorrect highlights fade in with a check or
cross drawn via inline SVG strokes (no library).

ROUGH EDGES (for claude-design pass)
------------------------------------
* The "By theme" subselector currently expands inline below the button —
  may want a more spatial reveal.
* No question shuffle within a mode (questions appear in JSON order).
  Quick-check is randomly sampled but theme/difficulty filters are not.
* Curriculum slugs assume current locale; if EN is on, /en/... slugs are
  used as-is; if JA is on, the leading /en/ is stripped to match jpinv.com
  routing. Verify against final site map.
* Accessibility: aria-live on #stage works for SR; consider focusing the
  first option on each question render so keyboard users land on choice 1.
* Personal-best logic compares percentage when total counts differ across
  retries (e.g. quick-check resampling). Acceptable for a prototype.
================================================================================
-->

<style>

  --ink-mid:    #172641;
  --ink-soft:   #304466;
  --rule:       #d6dee8;
  --rule-soft:  #e8edf3;
  --bg:         #ffffff;
  --bg-mid:     #f5f7fa;
  --bg-soft:    #fafbfc;
  --text:       #1f2937;
  --text-mid:   #4a5566;
  --text-dim:   #5f6875;
  --accent:     #9a7838;
  --accent-deep:#7d6028;
  --accent-soft:#f4eee4;
  --bad:        #b91c1c;
  --bad-soft:   #fdecec;
  --ok:         #2f6f4f;
  --ok-soft:    #e6f1ec;
  --warn:       #8a682b;
  --serif: 'Noto Serif JP', 'Yu Mincho', serif;
  --sans:  'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  --mono:  'DM Mono', monospace;
  --max: 760px;
  --gutter: 32px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg-soft);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  line-height: 1.65;
  min-height: 100vh;
  padding: 48px 0 96px;
}
@media (max-width: 640px) { :root { --gutter: 18px; } body { padding: 24px 0 64px; } }
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 var(--gutter); }
a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .2s, color .2s; }
a:hover { color: var(--ink); border-bottom-color: var(--accent); }
.label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); }
.rule-accent { width: 32px; height: 2px; background: var(--accent); margin: 14px 0 22px; }

/* === Top bar =============================================================== */
.topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
.brand { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); }
.brand a { border: none; }
.lang-toggle { display: inline-flex; align-items: center; gap: 0; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em; }
.lang-toggle button {
  background: transparent; border: 1px solid var(--rule); padding: 6px 10px;
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em;
  color: var(--text-dim); cursor: pointer; transition: all .2s; text-transform: uppercase;
}
.lang-toggle button + button { margin-left: -1px; }
.lang-toggle button.on { color: var(--ink); border-color: var(--ink-mid); background: var(--bg); }
.lang-toggle button:hover { color: var(--ink); }

/* === Card ================================================================== */
.card {
  background: var(--bg);
  border: 1px solid var(--rule);
  padding: 48px 48px 40px;
  position: relative;
  animation: cardIn .35s ease both;
}
.card.exiting { animation: cardOut .22s ease both; }
@keyframes cardIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes cardOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-4px); } }
@media (max-width: 640px) { .card { padding: 28px 22px 30px; } }

/* === Start screen ========================================================== */
.hero-title {
  font-family: var(--serif); font-weight: 300;
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  line-height: 1.2; color: var(--ink);
  letter-spacing: -0.01em;
}
.hero-sub {
  font-family: var(--sans); font-size: 0.92rem; color: var(--text-mid);
  margin-top: 18px; max-width: 56ch;
}
.modes { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; }
.mode-btn {
  display: block; width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--rule);
  padding: 18px 22px 16px; cursor: pointer;
  font-family: var(--sans); color: var(--text);
  transition: border-color .18s, background .18s, transform .18s;
  position: relative;
}
.mode-btn:hover { border-color: var(--ink-mid); background: var(--bg-soft); }
.mode-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.mode-btn .mode-title { font-family: var(--serif); font-size: 1.05rem; font-weight: 400; color: var(--ink); }
.mode-btn .mode-meta  { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-top: 6px; }
.mode-btn .mode-best  { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); position: absolute; right: 22px; top: 18px; }
.mode-btn[disabled] { opacity: .5; cursor: not-allowed; }

.subselector { margin-top: 10px; padding: 14px 18px; background: var(--bg-soft); border: 1px solid var(--rule-soft); display: none; }
.subselector.open { display: block; animation: cardIn .25s ease both; }
.sub-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.sub-chip {
  background: var(--bg); border: 1px solid var(--rule);
  padding: 8px 14px; font-family: var(--sans); font-size: 0.78rem;
  color: var(--text); cursor: pointer; transition: all .18s;
}
.sub-chip:hover { border-color: var(--ink-mid); }
.sub-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.sub-chip .chip-meta { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em; color: var(--text-dim); margin-left: 8px; }

/* === Progress ============================================================== */
.progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 16px; }
.progress-track { flex: 1; height: 2px; background: var(--rule); position: relative; overflow: hidden; }
.progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); transition: width .4s cubic-bezier(.4,0,.2,1); }
.progress-text { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.14em; color: var(--text-dim); white-space: nowrap; }
.abort-btn {
  background: transparent; border: none; cursor: pointer;
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-dim); padding: 4px 8px; transition: color .2s;
}
.abort-btn:hover { color: var(--bad); }

/* === Question screen ======================================================= */
.q-badges { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.badge {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 10px; border: 1px solid var(--rule); color: var(--ink-soft); background: var(--bg-soft);
}
.badge.diff-advanced { color: var(--accent); border-color: var(--accent); }
.badge.diff-intermediate { color: var(--ink); }
.badge.diff-intro { color: var(--text-dim); }

.q-stem {
  font-family: var(--serif); font-weight: 300;
  font-size: clamp(1.15rem, 2.6vw, 1.45rem);
  line-height: 1.45; color: var(--ink);
  margin-bottom: 28px;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--rule);
  padding: 14px 18px; cursor: pointer;
  font-family: var(--sans); font-size: 0.94rem; color: var(--text); line-height: 1.55;
  transition: border-color .15s, background .15s;
}
.option:hover:not([disabled]) { border-color: var(--ink-soft); background: var(--bg-soft); }
.option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.option .opt-letter {
  flex: 0 0 auto; width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim);
  border: 1px solid var(--rule); border-radius: 50%;
  margin-top: 2px;
}
.option .opt-body { flex: 1; }
.option.selected { border-color: var(--ink); background: var(--bg-soft); }
.option.selected .opt-letter { background: var(--ink); color: #fff; border-color: var(--ink); }
.option.correct { border-color: var(--ok); background: var(--ok-soft); animation: flashOk .5s ease; }
.option.correct .opt-letter { background: var(--ok); color: #fff; border-color: var(--ok); }
.option.wrong   { border-color: var(--bad); background: var(--bad-soft); animation: flashBad .5s ease; }
.option.wrong   .opt-letter { background: var(--bad); color: #fff; border-color: var(--bad); }
.option[disabled] { cursor: default; }
@keyframes flashOk  { 0% { transform: scale(1); } 30% { transform: scale(1.012); } 100% { transform: scale(1); } }
@keyframes flashBad { 0% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 100% { transform: translateX(0); } }

.option .mark { flex: 0 0 auto; width: 18px; height: 18px; margin-top: 4px; opacity: 0; }
.option.correct .mark, .option.wrong .mark { opacity: 1; animation: markDraw .5s .1s ease both; }
@keyframes markDraw { from { stroke-dashoffset: 24; opacity: 0; } to { stroke-dashoffset: 0; opacity: 1; } }
.mark path { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 24; stroke-dashoffset: 24; }
.option.correct .mark path { stroke: var(--ok); animation: markDraw .5s .1s ease both; }
.option.wrong   .mark path { stroke: var(--bad); animation: markDraw .5s .1s ease both; }

.actions { margin-top: 26px; display: flex; gap: 12px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }

  display: inline-block; text-decoration: none; font-family: var(--sans);

.explain .ex-links { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
.explain .ex-links a {
  font-family: var(--sans); font-size: 0.8rem; color: var(--ink-soft);

.explain .ex-links a:hover { color: var(--accent); }

.results-headline {
  font-family: var(--serif); font-weight: 300;
  font-size: clamp(1.6rem, 3.6vw, 2.1rem); line-height: 1.2; color: var(--ink);

}
.results-score { font-family: var(--mono); font-size: 2.2rem; color: var(--accent); margin: 18px 0 6px; letter-spacing: -0.02em; }

.results-section-h {
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-soft); margin: 36px 0 16px;
}
.theme-row { display: grid; grid-template-columns: 1fr 60px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule-soft); }
.theme-row:last-child { border-bottom: none; }
.theme-row .theme-name { font-family: var(--serif); font-size: 0.94rem; color: var(--ink); }
.theme-row .theme-bar { grid-column: 1 / -1; height: 2px; background: var(--rule); position: relative; }
.theme-row .theme-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); }
.theme-row .theme-count { font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim); text-align: right; }

.weak-list { display: flex; flex-direction: column; gap: 14px; }
.weak-item { padding: 14px 16px; background: var(--bg-soft); border-left: 2px solid var(--bad); }
.weak-item .weak-stem { font-family: var(--serif); font-size: 0.92rem; color: var(--ink); margin-bottom: 8px; }
.weak-item .weak-meta { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
.weak-item a { font-family: var(--sans); font-size: 0.8rem; color: var(--accent); }

.results-actions { margin-top: 36px; display: flex; gap: 12px; flex-wrap: wrap; }

/* === Misc ================================================================== */
.sr-only { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }
.fineprint { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; color: var(--text-dim); margin-top: 28px; text-align: center; text-transform: uppercase; }
</style>
