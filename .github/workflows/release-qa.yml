name: Release QA

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-gates:
    name: Lighthouse, accessibility, and visual gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run release QA gates
        run: npm run qa
